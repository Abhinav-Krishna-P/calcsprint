<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MATHCRISP | Training Session</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet"/>

            theme: {

                        "secondary": "#545f72",
                        "error": "#ba1a1a",
                        "on-secondary-container": "#586377",
                        "outline-variant": "#c4c6cf",
                        "surface-tint": "#455f88",
                        "inverse-primary": "#adc7f7",
                        "secondary-fixed-dim": "#bcc7dd",
                        "background": "#faf9fd",
                        "on-primary-fixed": "#001b3c",
                        "on-primary-fixed-variant": "#2d476f",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed": "#002110",
                        "surface": "#faf9fd",
                        "on-error": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "tertiary-container": "#003f23",
                        "on-surface": "#1a1c1e",
                        "inverse-on-surface": "#f1f0f4",
                        "on-secondary-fixed-variant": "#3c475a",
                        "tertiary": "#002713",
                        "on-primary-container": "#86a0cd",
                        "outline": "#74777f",
                        "on-tertiary-fixed-variant": "#00522f",
                        "on-secondary": "#ffffff",
                        "primary-fixed": "#d6e3ff",
                        "inverse-surface": "#2f3033",
                        "on-primary": "#ffffff",
                        "surface-container-highest": "#e3e2e6",
                        "on-background": "#1a1c1e",
                        "primary": "#002045",
                        "primary-fixed-dim": "#adc7f7",
                        "secondary-container": "#d5e0f7",
                        "on-surface-variant": "#43474e",
                        "tertiary-fixed-dim": "#74db9d",
                        "on-secondary-fixed": "#111c2c",
                        "surface-container": "#efedf1",
                        "surface-container-lowest": "#ffffff",
                        "primary-container": "#1a365d",
                        "surface-container-low": "#f4f3f7",
                        "secondary-fixed": "#d8e3fa",
                        "error-container": "#ffdad6",
                        "surface-dim": "#dad9dd",
                        "surface-container-high": "#e9e7eb"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "transition-fast": "150ms cubic-bezier(0.4, 0, 0.2, 1)",
                        "unit": "4px",
                        "focus-width": "640px",
                        "gutter": "24px",
                        "margin-desktop": "48px",
                        "margin-mobile": "16px",
                        "transition-instant": "50ms linear"
                    },
                    "fontFamily": {
                        "headline-lg": ["Inter"],
                        "label-caps": ["Inter"],
                        "math-display-md": ["Inter"],

                    },
                    "fontSize": {

                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700"}],
                        "math-display-md": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "math-display-lg": ["72px", {"lineHeight": "80px", "letterSpacing": "-0.02em", "fontWeight": "700"}],

                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]

                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        
        .math-input-focus:focus {
            outline: none;
            border-color: #002045; /* Deep Navy */
            border-width: 2px;
            box-shadow: 0px 4px 6px -1px rgba(0, 0, 0, 0.1), 0px 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .shake {
            animation: shake 0.1s ease-in-out 0s 2;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(8px); }
            50% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
            100% { transform: translateX(0); }
        }

        .success-flash {
            animation: success-flash 0.3s ease-out;
        }

        @keyframes success-flash {
            0% { border-color: #74777f; }
            50% { border-color: #4bb278; border-width: 4px; }
            100% { border-color: #74777f; }
        }

        body {
            background-color: #ffffff;
            overflow: hidden;
        }

        /* Block cursor effect */
        .block-cursor {
            caret-color: #002045;
        }
    </style>
</head>
<body class="flex flex-col h-screen font-body-md text-on-surface">
<!-- Progress & Timer Bar -->
<div class="fixed top-0 left-0 w-full z-50">
<div class="w-full h-1 bg-surface-container-highest">
<div class="h-full bg-on-tertiary-container transition-all duration-100 ease-linear" id="timer-bar" style="width: 100%;"></div>
</div>
<div class="w-full h-1 bg-surface-container">
<div class="h-full bg-primary transition-all duration-150" id="progress-bar" style="width: 20%;"></div>
</div>
</div>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile md:px-0 relative overflow-hidden">
<!-- HUD Overlay -->
<div class="absolute top-8 left-0 w-full flex justify-between px-gutter pointer-events-none">
<div class="flex flex-col items-start">
<span class="font-label-caps text-label-caps text-secondary mb-1">SESSION PROGRESS</span>
<span class="font-headline-md text-headline-md text-primary">Question 4/20</span>
</div>
<div class="flex flex-col items-end">
<span class="font-label-caps text-label-caps text-secondary mb-1">CURRENT SCORE</span>
<span class="font-headline-md text-headline-md text-primary">300 XP</span>
</div>
</div>
<!-- Problem Container -->
<div class="max-w-focus-width w-full flex flex-col items-center">
<!-- Drills Component Wrapper -->
<div class="w-full border border-outline-variant bg-surface-container-lowest p-8 md:p-12 transition-all duration-150" id="problem-card">
<div class="text-center mb-12">
<div class="font-math-display-md text-math-display-md md:font-math-display-lg md:text-math-display-lg text-primary tracking-tight" id="math-expression">
                        142 × 23
                    </div>
<div class="font-headline-md text-headline-md text-secondary mt-4 opacity-50">=</div>
</div>
<!-- Input Interface -->
<div class="w-full max-w-xs mx-auto">
<div class="relative mb-8">
<input autofocus="" class="w-full text-center font-math-display-md text-math-display-md bg-surface-container-low border border-outline p-6 block-cursor math-input-focus transition-fast" id="answer-input" placeholder="?" type="number"/>
</div>
<button class="w-full py-4 bg-primary text-on-primary font-label-caps text-label-caps tracking-widest hover:opacity-90 active:scale-[0.98] transition-all duration-150" id="submit-btn">
                        SUBMIT [ENTER]
                    </button>
</div>
</div>
<!-- Contextual Info -->
<div class="mt-8 flex gap-4">
<div class="px-4 py-2 bg-surface-container-high flex items-center gap-2">
<span class="material-symbols-outlined text-secondary text-sm">bolt</span>
<span class="font-label-caps text-label-caps text-secondary">COMBO: 3X</span>
</div>
<div class="px-4 py-2 bg-surface-container-high flex items-center gap-2">
<span class="material-symbols-outlined text-secondary text-sm">schedule</span>
<span class="font-label-caps text-label-caps text-secondary" id="timer-text">08.4s</span>
</div>
</div>
</div>
</main>
<!-- Task Suppression Logic Check: No Navigation Shells (Transactional/Focused) -->
<script>
        // Micro-interactions and interface logic
        const input = document.getElementById('answer-input');
        const submitBtn = document.getElementById('submit-btn');
        const problemCard = document.getElementById('problem-card');
        const timerBar = document.getElementById('timer-bar');
        const timerText = document.getElementById('timer-text');
        
        let timeLeft = 100; // Percent
        let secondsLeft = 10.0;

        // Auto-focus maintenance
        document.addEventListener('click', () => {
            input.focus();
        });

        // Answer Submission Flow
        function submitAnswer() {
            const value = input.value.trim();
            if (!value) return;

            // Simplified Mock Logic for Demo
            if (value === "3266") { // 142 * 23 = 3266
                triggerSuccess();
            } else {
                triggerFailure();
            }
        }

        function triggerSuccess() {
            problemCard.classList.add('success-flash');
            setTimeout(() => {
                problemCard.classList.remove('success-flash');
                input.value = '';
                // In a real app, logic to load next question would go here
            }, 300);
        }

        function triggerFailure() {
            problemCard.classList.add('shake');
            input.classList.add('border-error');
            setTimeout(() => {
                problemCard.classList.remove('shake');
                input.classList.remove('border-error');
                input.value = '';
            }, 300);
        }

        // Event Listeners
        submitBtn.addEventListener('click', submitAnswer);
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') submitAnswer();
        });

        // High-precision Timer Simulation
        function updateTimer() {
            if (secondsLeft > 0) {
                secondsLeft -= 0.1;
                timeLeft = (secondsLeft / 10) * 100;
                timerBar.style.width = `${timeLeft}%`;
                timerText.innerText = `${secondsLeft.toFixed(1)}s`;
                
                // Color transition to warning
                if (secondsLeft < 3) {
                    timerBar.classList.remove('bg-on-tertiary-container');
                    timerBar.classList.add('bg-error');
                }
            } else {
                timerText.innerText = `0.0s`;
                timerBar.style.width = `0%`;
            }
        }

        setInterval(updateTimer, 100);

        // Snap-in Entrance Animation
        window.onload = () => {
            problemCard.style.opacity = '0';
            problemCard.style.transform = 'scale(0.98)';
            setTimeout(() => {
                problemCard.style.transition = 'all 200ms cubic-bezier(0.2, 0.8, 0.2, 1)';
                problemCard.style.opacity = '1';
                problemCard.style.transform = 'scale(1)';
            }, 50);
        };
    </script>
</body></html>
