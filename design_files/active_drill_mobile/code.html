<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>MATHCRISP | Drills</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .animate-shake {
            animation: shake 0.1s ease-in-out 0s 2;
        }
        /* Hide scrollbars for a cleaner UI */
        ::-webkit-scrollbar { display: none; }
        body { -webkit-tap-highlight-color: transparent; }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed": "#91f8b8",
                        "surface-variant": "#e3e2e6",
                        "surface-bright": "#faf9fd",
                        "on-tertiary-container": "#4bb278",
                        "secondary": "#545f72",
                        "error": "#ba1a1a",
                        "on-secondary-container": "#586377",
                        "outline-variant": "#c4c6cf",
                        "surface-tint": "#455f88",
                        "inverse-primary": "#adc7f7",
                        "secondary-fixed-dim": "#bcc7dd",
                        "background": "#faf9fd",
                        "on-primary-fixed": "#001b3c",
                        "on-primary-fixed-variant": "#2d476f",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed": "#002110",
                        "surface": "#faf9fd",
                        "on-error": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "tertiary-container": "#003f23",
                        "on-surface": "#1a1c1e",
                        "inverse-on-surface": "#f1f0f4",
                        "on-secondary-fixed-variant": "#3c475a",
                        "tertiary": "#002713",
                        "on-primary-container": "#86a0cd",
                        "outline": "#74777f",
                        "on-tertiary-fixed-variant": "#00522f",
                        "on-secondary": "#ffffff",
                        "primary-fixed": "#d6e3ff",
                        "inverse-surface": "#2f3033",
                        "on-primary": "#ffffff",
                        "surface-container-highest": "#e3e2e6",
                        "on-background": "#1a1c1e",
                        "primary": "#002045",
                        "primary-fixed-dim": "#adc7f7",
                        "secondary-container": "#d5e0f7",
                        "on-surface-variant": "#43474e",
                        "tertiary-fixed-dim": "#74db9d",
                        "on-secondary-fixed": "#111c2c",
                        "surface-container": "#efedf1",
                        "surface-container-lowest": "#ffffff",
                        "primary-container": "#1a365d",
                        "surface-container-low": "#f4f3f7",
                        "secondary-fixed": "#d8e3fa",
                        "error-container": "#ffdad6",
                        "surface-dim": "#dad9dd",
                        "surface-container-high": "#e9e7eb"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "transition-fast": "150ms cubic-bezier(0.4, 0, 0.2, 1)",
                        "unit": "4px",
                        "focus-width": "640px",
                        "gutter": "24px",
                        "margin-desktop": "48px",
                        "margin-mobile": "16px",
                        "transition-instant": "50ms linear"
                    },
                    "fontFamily": {
                        "headline-lg": ["Inter"],
                        "label-caps": ["Inter"],
                        "math-display-md": ["Inter"],
                        "headline-md": ["Inter"],
                        "math-display-lg": ["Inter"],
                        "math-display-mobile": ["Inter"],
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "600"}],
                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700"}],
                        "math-display-md": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "math-display-lg": ["72px", {"lineHeight": "80px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "math-display-mobile": ["40px", {"lineHeight": "48px", "fontWeight": "700"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface flex flex-col h-screen overflow-hidden">
<!-- Progress Indicator (Mandate: Linear bar at very top) -->
<div class="fixed top-0 left-0 w-full h-2 bg-surface-container-highest z-[60]">
<div class="h-full bg-tertiary-fixed transition-all duration-300" id="progress-bar" style="width: 35%;"></div>
</div>
<!-- TopAppBar Fragment (Supressed main shell for focused task) -->
<header class="flex justify-between items-center px-4 h-16 bg-surface-container-lowest z-50">
<button class="w-10 h-10 flex items-center justify-center text-on-surface-variant hover:bg-surface-container rounded-none transition-fast" onclick="window.history.back()">
<span class="material-symbols-outlined">close</span>
</button>
<div class="flex flex-col items-center">
<span class="font-label-caps text-label-caps text-secondary uppercase tracking-widest">DRILL MODE</span>
<span class="font-bold text-primary" id="streak-counter">14 STREAK</span>
</div>
<button class="w-10 h-10 flex items-center justify-center text-on-surface-variant hover:bg-surface-container rounded-none transition-fast">
<span class="material-symbols-outlined">settings</span>
</button>
</header>
<!-- Main Drill Canvas -->
<main class="flex-1 flex flex-col items-center justify-center px-4 space-y-8 pb-4">
<!-- Timer Display (Visual Feedback) -->
<div class="w-full max-w-[640px] flex flex-col items-center">
<div class="text-on-tertiary-container font-headline-md text-headline-md flex items-center gap-2 transition-colors duration-500" id="timer-ring">
<span class="material-symbols-outlined">timer</span>
<span id="timer-text">0:42</span>
</div>
</div>
<!-- Math Problem Card -->
<div class="w-full max-w-[640px] bg-surface-container-lowest border border-outline-variant p-8 flex flex-col items-center justify-center min-h-[220px] transition-all duration-150" id="problem-container">
<div class="font-label-caps text-label-caps text-secondary mb-4 opacity-60">ALGEBRA • LEVEL 4</div>
<div class="font-math-display-mobile text-math-display-mobile md:font-math-display-lg md:text-math-display-lg text-primary text-center" id="math-display">
                14 × 13 + ? = 200
            </div>
<!-- Answer Slot -->
<div class="mt-8 border-b-4 border-primary px-8 py-2 min-w-[120px] flex justify-center items-center" id="answer-box">
<span class="font-math-display-md text-math-display-md text-primary h-14" id="user-input"></span>
<span class="w-4 h-10 bg-primary animate-pulse ml-1" id="cursor"></span>
</div>
</div>
<!-- Accuracy Chips (Decorative/Status) -->
<div class="flex gap-2">
<span class="px-3 py-1 bg-surface-container text-on-surface-variant font-label-caps text-label-caps rounded-none border border-outline-variant">98.2% ACCURACY</span>
<span class="px-3 py-1 bg-primary-container text-on-primary-container font-label-caps text-label-caps rounded-none">PREMIUM SPEED</span>
</div>
</main>
<!-- Custom Numeric Keypad (Optimized for Speed) -->
<div class="w-full bg-surface-container-low border-t border-outline-variant grid grid-cols-3 gap-0 h-[309px]">
<button class="border-r border-b border-outline-variant active:bg-primary-container active:text-on-primary-container font-headline-md text-headline-md text-on-surface transition-instant" onclick="appendNum('1')">1</button>
<button class="border-r border-b border-outline-variant active:bg-primary-container active:text-on-primary-container font-headline-md text-headline-md text-on-surface transition-instant" onclick="appendNum('2')">2</button>
<button class="border-b border-outline-variant active:bg-primary-container active:text-on-primary-container font-headline-md text-headline-md text-on-surface transition-instant" onclick="appendNum('3')">3</button>
<button class="border-r border-b border-outline-variant active:bg-primary-container active:text-on-primary-container font-headline-md text-headline-md text-on-surface transition-instant" onclick="appendNum('4')">4</button>
<button class="border-r border-b border-outline-variant active:bg-primary-container active:text-on-primary-container font-headline-md text-headline-md text-on-surface transition-instant" onclick="appendNum('5')">5</button>
<button class="border-b border-outline-variant active:bg-primary-container active:text-on-primary-container font-headline-md text-headline-md text-on-surface transition-instant" onclick="appendNum('6')">6</button>
<button class="border-r border-b border-outline-variant active:bg-primary-container active:text-on-primary-container font-headline-md text-headline-md text-on-surface transition-instant" onclick="appendNum('7')">7</button>
<button class="border-r border-b border-outline-variant active:bg-primary-container active:text-on-primary-container font-headline-md text-headline-md text-on-surface transition-instant" onclick="appendNum('8')">8</button>
<button class="border-b border-outline-variant active:bg-primary-container active:text-on-primary-container font-headline-md text-headline-md text-on-surface transition-instant" onclick="appendNum('9')">9</button>
<button class="border-r border-outline-variant active:bg-error-container text-error font-headline-md text-headline-md transition-instant" onclick="clearNum()">
<span class="material-symbols-outlined">backspace</span>
</button>
<button class="border-r border-outline-variant active:bg-primary-container active:text-on-primary-container font-headline-md text-headline-md text-on-surface transition-instant" onclick="appendNum('0')">0</button>
<button class="bg-primary text-white font-label-caps text-label-caps tracking-widest active:scale-95 transition-all duration-75" onclick="submitAnswer()">
            SUBMIT
        </button>
</div>
<script>
        let currentInput = "";
        const inputDisplay = document.getElementById('user-input');
        const container = document.getElementById('problem-container');
        const timerText = document.getElementById('timer-text');
        const timerRing = document.getElementById('timer-ring');
        let timeLeft = 42;

        function appendNum(n) {
            if(currentInput.length < 5) {
                currentInput += n;
                updateDisplay();
                // Minimal vibration for feedback if available
                if (navigator.vibrate) navigator.vibrate(5);
            }
        }

        function clearNum() {
            currentInput = currentInput.slice(0, -1);
            updateDisplay();
        }

        function updateDisplay() {
            inputDisplay.innerText = currentInput;
        }

        function submitAnswer() {
            const correctAnswer = "18";
            if (currentInput === correctAnswer) {
                // SUCCESS FEEDBACK
                container.classList.remove('border-outline-variant');
                container.classList.add('border-on-tertiary-container', 'bg-tertiary-fixed', 'scale-105');
                setTimeout(() => {
                    nextProblem();
                }, 200);
            } else {
                // FAILURE FEEDBACK
                container.classList.add('animate-shake', 'border-error');
                if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
                setTimeout(() => {
                    container.classList.remove('animate-shake', 'border-error');
                }, 400);
            }
        }

        function nextProblem() {
            // Reset UI for next problem
            currentInput = "";
            updateDisplay();
            container.className = "w-full max-w-[640px] bg-surface-container-lowest border border-outline-variant p-8 flex flex-col items-center justify-center min-h-[220px] transition-all duration-150";
            
            // Increment progress
            const bar = document.getElementById('progress-bar');
            let currentWidth = parseInt(bar.style.width);
            bar.style.width = (currentWidth + 10) + "%";
            
            // Change Math
            const problems = [
                "25 × 4 - ? = 82",
                "156 ÷ 12 + 7 = ?",
                "9 ² - 11 = ?",
                "√144 + 13 = ?"
            ];
            document.getElementById('math-display').innerHTML = problems[Math.floor(Math.random() * problems.length)];
        }

        // Timer Logic
        const timerInterval = setInterval(() => {
            timeLeft--;
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            timerText.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            
            // Visual feedback on timer color
            if (timeLeft < 10) {
                timerRing.className = "text-error font-headline-md text-headline-md flex items-center gap-2 transition-colors duration-500 animate-pulse";
            } else if (timeLeft < 20) {
                timerRing.className = "text-on-secondary-fixed-variant font-headline-md text-headline-md flex items-center gap-2 transition-colors duration-500";
            }

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                alert("Session Complete!");
            }
        }, 1000);

        // Physical Keyboard Support for desktop testing
        window.addEventListener('keydown', (e) => {
            if(e.key >= '0' && e.key <= '9') appendNum(e.key);
            if(e.key === 'Backspace') clearNum();
            if(e.key === 'Enter') submitAnswer();
        });
    </script>
</body></html>
