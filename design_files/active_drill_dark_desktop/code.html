<script>
        // Simple micro-interaction for the numpad
        document.querySelectorAll('.numpad-grid button').forEach(button => {
            button.addEventListener('mousedown', () => {
                button.classList.add('bg-primary-container', 'text-on-primary-container');
            });
            button.addEventListener('mouseup', () => {
                setTimeout(() => {
                    button.classList.remove('bg-primary-container', 'text-on-primary-container');
                }, 50);
            });
        });

        // Simulation of timer
        let seconds = 262;
        const timeDisplay = document.querySelector('.tabular-nums');
        setInterval(() => {
            seconds++;
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            if (timeDisplay) {
                timeDisplay.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }
        }, 1000);
    </script>
